# ============================================================
# PIGEARD VITRINE — configuration nginx du conteneur
# Monté par docker-compose sur /etc/nginx/conf.d/default.conf
# (voir deploy/installer-serveur.sh pour l'installation)
# ============================================================
server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # ── Redirection domaine nu → www (évite le contenu dupliqué) ──
  if ($host = "pigeard-opticiens.fr") {
    return 301 https://www.pigeard-opticiens.fr$request_uri;
  }

  # ── Compression gzip (~75 % de données en moins) ──
  gzip on;
  gzip_vary on;
  gzip_comp_level 6;
  gzip_min_length 512;
  gzip_types text/plain text/css text/javascript application/javascript
             application/json application/ld+json application/xml image/svg+xml;

  # ── Page 404 personnalisée ──
  error_page 404 /404.html;

  # ── En-têtes de sécurité de base ──
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # ── Fichiers de travail : non servis au public ──
  location ~* \.(ai|psd|py|md|yml|toml|sh)$ { return 404; }
  location ^~ /assets/creations/raw/   { return 404; }
  location ^~ /assets/creations/_prev/ { return 404; }
  location ^~ /assets/charte/          { return 404; }
  location ^~ /tools/   { return 404; }
  location ^~ /content/ { return 404; }
  location ^~ /_deploy/ { return 404; }
  location ^~ /deploy/  { return 404; }

  # ── Anciennes URLs Shopify (QR codes imprimés sur les supports) ──
  # Les QR codes renvoient vers les adresses de l'ancien site : on les
  # redirige définitivement vers les pages équivalentes du nouveau site.
  location = /pages/lentilles-et-produits-dentretien  { return 301 /lentilles.html; }
  location = /pages/lentilles-et-produits-dentretien/ { return 301 /lentilles.html; }
  location = /pages/nos-offres  { return 301 "/engagements.html#offres"; }
  location = /pages/nos-offres/ { return 301 "/engagements.html#offres"; }
  # Filet de sécurité : toute autre ancienne URL Shopify → accueil
  location ^~ /pages/       { return 301 /; }
  location ^~ /products/    { return 301 /; }
  location ^~ /collections/ { return 301 /; }

  # ── JSON éditables via Pages CMS : cache court (5 min) ──
  location ^~ /assets/data/ {
    add_header Cache-Control "public, max-age=300";
  }

  # ── Polices, images, vidéos : cache 30 jours ──
  location ~* \.(woff2|webp|jpg|jpeg|png|gif|svg|ico|mp4)$ {
    add_header Cache-Control "public, max-age=2592000, stale-while-revalidate=86400";
  }

  # ── CSS / JS : cache 1 h (mises à jour du site visibles rapidement) ──
  location ~* \.(css|js)$ {
    add_header Cache-Control "public, max-age=3600, stale-while-revalidate=86400";
  }

  # ── HTML : toujours revalidé (le site se met à jour toutes les 5 min) ──
  location / {
    add_header Cache-Control "no-cache";
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    try_files $uri $uri/ =404;
  }
}
