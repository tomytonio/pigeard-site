# ────────────────────────────────────────────────────────────────
#  Éditeur de contenu Pigeard — Pages CMS (https://pagescms.org)
#  Permet de modifier les textes & photos du site sans toucher au code.
#  Pour l'activer : voir GUIDE-EDITION.md
# ────────────────────────────────────────────────────────────────

# Emplacements où sont rangées les photos uploadées depuis l'éditeur
media:
  - name: creations
    label: Photos des créations
    input: assets/creations
    output: assets/creations
    extensions: [jpg, jpeg, png, webp]

# Contenus modifiables dans l'éditeur
content:
  # ---- TEXTES DE LA PAGE D'ACCUEIL ----
  - name: textes-accueil
    label: Textes — Page d'accueil
    type: file
    path: assets/data/textes.json
    fields:
      - name: accueil
        label: Accueil
        type: object
        fields:
          - { name: heroLead, label: "Accroche principale (sous le logo)", type: string }
          - { name: heroNote, label: "Petite note manuscrite", type: string }
          - { name: introTexte, label: "Paragraphe d'introduction", type: text }
          - { name: friseTitre, label: "Titre de la frise du temps", type: string }
          - { name: expertisesTitre, label: "Titre — Nos expertises", type: string }
          - { name: expertisesTexte, label: "Texte — Nos expertises", type: text }
          - { name: savoirTitre, label: "Titre — Savoir-faire (Entrée = 2e ligne)", type: text }
          - { name: savoirTexte, label: "Texte — Savoir-faire", type: text }
          - { name: mutuellesTitre, label: "Titre — Mutuelles (Entrée = 2e ligne)", type: text }
          - { name: equipeTitre, label: "Titre — Équipe (Entrée = 2e ligne)", type: text }
          - { name: equipeTexte, label: "Texte — Équipe", type: text }
          - { name: instagramTitre, label: "Titre — Instagram (Entrée = 2e ligne)", type: text }
          - { name: ctaTitre, label: "Titre — Venez choisir votre regard", type: string }
          - { name: ctaNote, label: "Note manuscrite — sous le titre", type: string }
          - { name: magasinsTitre, label: "Titre — Nos magasins", type: string }
          - { name: magasinsTexte, label: "Texte — Nos magasins", type: text }

  # ---- LES CRÉATIONS SUR-MESURE ----
  - name: creations
    label: Créations sur-mesure
    type: file
    path: assets/data/creations.json
    fields:
      - name: creations
        label: Montures
        type: object
        list:
          collapsible:
            collapsed: true
            summary: "{name}"
        fields:
          - { name: name, label: Nom, type: string }
          - { name: tagline, label: "Accroche (texte manuscrit)", type: string }
          - { name: description, label: Descriptif, type: text }
          - { name: cats, label: "Catégories (femme, homme, solaire)", type: string, list: true }
          - { name: image, label: Photo de la monture, type: image, options: { media: creations } }
          - { name: slug, label: "Identifiant — NE PAS MODIFIER", type: string, readonly: true }

  # ---- NOS MARQUES ----
  - name: marques
    label: Nos marques
    type: file
    path: assets/data/marques.json
    fields:
      - name: brands
        label: Marques
        type: object
        list:
          collapsible:
            collapsed: true
            summary: "{name}"
        fields:
          - { name: name, label: Nom de la marque, type: string }
          - { name: tagline, label: Accroche, type: string }
          - { name: paragraphs, label: "Paragraphes de présentation", type: text, list: true }
          - { name: category, label: "Catégories (solaire, optique, femme…)", type: string, list: true }
          - { name: origin, label: Origine, type: string }
          - { name: founded, label: Année de création, type: number }
          - { name: style, label: "Style (mots-clés)", type: string }
          - { name: madeInFrance, label: Fabriqué en France, type: boolean }
          - { name: url, label: Site officiel de la marque, type: string }
          - { name: slug, label: "Identifiant — NE PAS MODIFIER", type: string, readonly: true }
